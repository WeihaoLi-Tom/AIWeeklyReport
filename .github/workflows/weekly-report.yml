# AI Weekly Report - Scheduled run and temporary link
# Runs Dify workflow, generates HTML report, outputs temporary link (R2 presigned or Pages)

name: AI Weekly Report

on:
  schedule:
    # Run every Monday at 01:00 UTC (09:00 Beijing)
    - cron: "30 1 * * 1"
  workflow_dispatch:
    # Allow manual trigger from Actions tab

env:
  DIFY_APP_TYPE: chat
  DIFY_USER: github-actions-bot
  DIFY_RESPONSE_MODE: streaming
  DIFY_RETRY_MAX_ATTEMPTS: "5"
  REPORT_AUTO_GENERATE: "true"
  REPORT_AUTO_OPEN: "false"
  REPORT_LATEST: "1"
  OUTPUT_FILE: .ci-output/workflow_runs.jsonl
  REPORT_OUTPUT_FILE: .ci-output/workflow_report.html

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare clean output directory
        run: |
          rm -rf .ci-output
          mkdir -p .ci-output

      - name: Run Dify workflow scheduler
        id: run-scheduler
        env:
          DIFY_BASE_URL: ${{ secrets.DIFY_BASE_URL }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_APP_TYPE: ${{ secrets.DIFY_APP_TYPE || 'chat' }}
          DIFY_QUERY: ${{ secrets.DIFY_QUERY }}
          DIFY_INPUTS: ${{ secrets.DIFY_INPUTS }}
          R2_ENABLED: ${{ secrets.R2_ENABLED }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_KEY_PREFIX: ${{ secrets.R2_KEY_PREFIX }}
          R2_PRESIGN_EXPIRES: ${{ secrets.R2_PRESIGN_EXPIRES }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL || secrets.R2_PUBLIC_BASE_URL }}
        run: |
          set -o pipefail
          python dify_workflow_scheduler.py --mode once 2>&1 | tee .ci-output/scheduler.log
          if grep -q '\[run 1\] failed' .ci-output/scheduler.log; then
            echo "Scheduler run failed. See logs above."
            exit 1
          fi
          # Extract R2 presigned URL if present
          url=$(grep -oE '\[R2_LINK\]https?://[^[:space:]]+' .ci-output/scheduler.log | sed 's/^\[R2_LINK\]//' | tail -1)
          r2_enabled=$(echo "${R2_ENABLED:-false}" | tr '[:upper:]' '[:lower:]')
          if [ "$r2_enabled" = "true" ] && [ -z "$url" ]; then
            echo "R2 is enabled but no R2 link was generated."
            exit 1
          fi
          if [ -n "$url" ]; then
            echo "presigned_url=$url" >> $GITHUB_OUTPUT
            echo "### Report link (R2)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[Open report]($url)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload scheduler log artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('.ci-output/scheduler.log') != ''
        with:
          name: scheduler-log-${{ github.run_id }}
          path: .ci-output/scheduler.log

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: success() && hashFiles('.ci-output/workflow_report.html') != ''
        with:
          name: weekly-report-${{ github.run_id }}
          path: .ci-output/workflow_report.html

      - name: Prepare Pages deploy dir
        if: success() && hashFiles('.ci-output/workflow_report.html') != ''
        run: |
          mkdir -p deploy
          cp .ci-output/workflow_report.html deploy/index.html

      - name: Deploy to GitHub Pages
        if: success() && hashFiles('.ci-output/workflow_report.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy report ${{ github.run_id }}"

      - name: Add Pages link to summary
        if: success() && hashFiles('.ci-output/workflow_report.html') != ''
        run: |
          pages_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          echo "### Report link (GitHub Pages)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Open report]($pages_url)" >> $GITHUB_STEP_SUMMARY

      - name: Send report email
        if: success() && steps.run-scheduler.outputs.presigned_url != ''
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          REPORT_URL: ${{ steps.run-scheduler.outputs.presigned_url }}
        run: |
          if [ -z "${SMTP_HOST:-}" ] || [ -z "${SMTP_PORT:-}" ] || [ -z "${SMTP_PASSWORD:-}" ] || [ -z "${EMAIL_TO:-}" ] || [ -z "${EMAIL_FROM:-}" ]; then
            echo "Email settings missing, skip sending email."
            exit 0
          fi
          python - <<'PY'
          import os
          import smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          host = os.environ["SMTP_HOST"]
          port = int(os.environ["SMTP_PORT"])
          user = os.environ["EMAIL_FROM"]
          password = os.environ["SMTP_PASSWORD"]
          to_email = os.environ["EMAIL_TO"]
          report_url = os.environ["REPORT_URL"]

          msg = MIMEMultipart()
          msg["Subject"] = "AI Weekly Report is ready"
          msg["From"] = user
          msg["To"] = to_email
          html = (
              "<p>Your AI Weekly Report is ready.</p>"
              f'<p><a href="{report_url}">Open report</a></p>'
          )
          msg.attach(MIMEText(html, "html", "utf-8"))

          with smtplib.SMTP_SSL(host, port, timeout=30) as server:
              server.login(user, password)
              server.sendmail(user, [to_email], msg.as_string())

          print("Email sent successfully.")
          PY
